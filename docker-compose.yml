version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: runner-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api_gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: runner-api-gateway
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      - DEFAULT_PROXY_USER_ID=${DEFAULT_PROXY_USER_ID:-1}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - redis
      - tool_executor
    restart: unless-stopped

  tool_registry:
    build:
      context: .
      dockerfile: tool_registry/Dockerfile
    container_name: runner-tool-registry
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  seeder:
    build:
      context: .
      dockerfile: scripts/Dockerfile.seeder
    container_name: runner-seeder
    environment:
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
    depends_on:
      tool_registry:
        condition: service_healthy
    restart: "no"

  docker_proxy:
      image: tecnativa/docker-socket-proxy
      container_name: runner-docker-proxy
      restart: unless-stopped
      environment:
        CONTAINERS: 1
        IMAGES: 1
        INFO: 1
        POST: 1

        AUTH: 0
        BUILD: 0
        COMMIT: 0
        CONFIGS: 0
        DISTRIBUTION: 0
        EVENTS: 0
        EXEC: 0
        NETWORKS: 0
        NODES: 0
        PLUGINS: 0
        SECRETS: 0
        SERVICES: 0
        SESSION: 0
        SWARM: 0
        SYSTEM: 0
        TASKS: 0
        VOLUMES: 0

      volumes:
        - /var/run/docker.sock:/var/run/docker.sock:ro

  tool_executor:
      build:
        context: .
        dockerfile: tool_executor/Dockerfile

      container_name: runner-tool-executor

      ports:
        - "8004:8004"

      environment:
        - DATABASE_URL=${DATABASE_URL}
        - TOOL_REGISTRY_URL=${TOOL_REGISTRY_URL}
        - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
        - DOCKER_HOST=tcp://docker_proxy:2375
        - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}

      depends_on:
        - redis
        - tool_registry
        - docker_proxy

      restart: unless-stopped

  tool_curl:
    build:
      context: tools/curl
      dockerfile: Dockerfile
    image: backend_runner-curl
    container_name: runner-tool-curl-builder
    entrypoint: ["echo", "imagen lista"]

  tool_ls:
    build:
      context: tools/ls
      dockerfile: Dockerfile
    image: backend_runner-ls
    container_name: runner-tool-ls-builder
    entrypoint: ["echo", "imagen lista"]

  tool_cat:
